version: '3.8'

services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: initializes the single-node replica set that MongoDB
  # transactions require (see order.service.ts). Runs once, then exits 0.
  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      bash -c "
      mongosh --host mongo --quiet --eval '
        try {
          rs.status();
          print(\"replica set already initialized\");
        } catch (e) {
          rs.initiate({ _id: \"rs0\", members: [{ _id: 0, host: \"mongo:27017\" }] });
          print(\"replica set initiated\");
        }
      '"

  backend:
    build: ./backend
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/bito_pos?replicaSet=rs0
      JWT_SECRET: change-me-super-secret
      JWT_EXPIRES_IN: 8h
      PAYMENT_WEBHOOK_SECRET: change-me-webhook-secret
      REPORT_CACHE_TTL_MS: 30000

  # frontend:
  #   build: ./frontend
  #   depends_on:
  #     - backend
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     VITE_API_URL: http://localhost:4000/api

volumes:
  mongo_data: